<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcadia Settings</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #efefef;
        color: #000;
        font-family: Arial, sans-serif;
      }

      .panel {
        max-width: 720px;
        padding: 20px;
        border: 4px solid #000;
        background: #f8ed00;
        box-shadow: 12px 12px 0 #000;
      }

      h1 {
        margin-top: 0;
        font-family: "Arial Black", Impact, sans-serif;
        text-transform: uppercase;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-family: "Arial Black", Impact, sans-serif;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 3px solid #000;
        box-sizing: border-box;
        font-size: 16px;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }

      .toggle input {
        width: auto;
      }

      button {
        margin-top: 18px;
        padding: 10px 16px;
        border: 3px solid #000;
        background: #000;
        color: #fff;
        font-family: "Arial Black", Impact, sans-serif;
        text-transform: uppercase;
        cursor: pointer;
      }

      #status {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Arcadia settings</h1>
      <p>Plug in Gemini if you want model-backed analysis. Leave it blank to use the local detector.</p>
      <label for="apiKey">Gemini API key</label>
      <input id="apiKey" type="password" autocomplete="off" />

      <label for="model">Gemini model</label>
      <select id="model">
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
        <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
      </select>

      <label class="toggle" for="autoScan">
        <input id="autoScan" type="checkbox" />
        <span>Auto-scan pages on load</span>
      </label>

      <button id="save">Save</button>
      <div id="status"></div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
